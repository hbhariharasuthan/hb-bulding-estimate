services:
  backend:
    build: ./backend
    container_name: backend
    environment:
      DATABASE_URL: "postgresql+psycopg2://admin:admin123@db:5432/bme_db"
      JWT_SECRET: "change-me-in-production"
      # Dev: allow any origin (Bearer-only API). Set CORS_ALLOW_ALL=false in production.
      CORS_ALLOW_ALL: "true"
      # Used when CORS_ALLOW_ALL=false — list every dev origin (scheme+host+port).
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081,http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        # Same origin as mapped port (8080:80) so /api/* is proxied by nginx to the backend.
        API_BASE_URL: http://localhost:8080
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bme_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
